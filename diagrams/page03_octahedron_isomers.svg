<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" font-family="Georgia, serif" font-size="13">
  <title>Page 3 — Octahedron, 2-particle case: 3 isomers (with bottom-row variants)</title>

  <text x="20" y="25" font-size="14" font-style="italic">
    Octahedron, 2 particle types — bottom completely determined by top — 3 isomers
  </text>

  <!-- Reusable octahedron template
       Vertices: top (T), bottom (B), and a square (N,E,S,W) in the middle.
       Solid edges = front; dashed = back.
       'fillColors' is set per instance via inline circles. -->
  <defs>
    <g id="oct">
      <!-- middle square: N top, E right, S bottom, W left -->
      <!-- solid front edges -->
      <line x1="0"   y1="-65" x2="55"  y2="0"   stroke="black" stroke-width="1.3"/>
      <line x1="55"  y1="0"   x2="0"   y2="65"  stroke="black" stroke-width="1.3"/>
      <line x1="0"   y1="-65" x2="-55" y2="0"   stroke="black" stroke-width="1.0" stroke-dasharray="4,3"/>
      <line x1="-55" y1="0"   x2="0"   y2="65"  stroke="black" stroke-width="1.0" stroke-dasharray="4,3"/>
      <!-- top apex to square -->
      <line x1="0" y1="-100" x2="0"   y2="-65" stroke="black" stroke-width="1.3"/>
      <line x1="0" y1="-100" x2="55"  y2="0"   stroke="black" stroke-width="1.3"/>
      <line x1="0" y1="-100" x2="0"   y2="65"  stroke="black" stroke-width="1.3"/>
      <line x1="0" y1="-100" x2="-55" y2="0"   stroke="black" stroke-width="1.0" stroke-dasharray="4,3"/>
      <!-- bottom apex to square -->
      <line x1="0" y1="100" x2="0"   y2="-65" stroke="black" stroke-width="1.0" stroke-dasharray="4,3"/>
      <line x1="0" y1="100" x2="55"  y2="0"   stroke="black" stroke-width="1.3"/>
      <line x1="0" y1="100" x2="0"   y2="65"  stroke="black" stroke-width="1.3"/>
      <line x1="0" y1="100" x2="-55" y2="0"   stroke="black" stroke-width="1.0" stroke-dasharray="4,3"/>
    </g>
  </defs>

  <!-- TOP ROW: 3 distinct isomers --------------------------------------- -->

  <!-- Isomer A: top and bottom apex both type X; equator alternating -->
  <g transform="translate(130,160)">
    <use href="#oct"/>
    <circle cx="0"   cy="-100" r="8" fill="#222"/>
    <circle cx="0"   cy="100"  r="8" fill="#222"/>
    <circle cx="0"   cy="-65"  r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <circle cx="55"  cy="0"    r="7" fill="#222"/>
    <circle cx="0"   cy="65"   r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <circle cx="-55" cy="0"    r="7" fill="#222"/>
    <text x="0" y="135" text-anchor="middle" font-style="italic">isomer 1</text>
  </g>

  <!-- Isomer B: top apex X, bottom apex Y; equator alternating -->
  <g transform="translate(380,160)">
    <use href="#oct"/>
    <circle cx="0"   cy="-100" r="8" fill="#222"/>
    <circle cx="0"   cy="100"  r="8" fill="#fff" stroke="black" stroke-width="1.2"/>
    <circle cx="0"   cy="-65"  r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <circle cx="55"  cy="0"    r="7" fill="#222"/>
    <circle cx="0"   cy="65"   r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <circle cx="-55" cy="0"    r="7" fill="#222"/>
    <text x="0" y="135" text-anchor="middle" font-style="italic">isomer 2</text>
  </g>

  <!-- Isomer C: top & bottom apex same type, equator paired (two adjacent same color) -->
  <g transform="translate(630,160)">
    <use href="#oct"/>
    <circle cx="0"   cy="-100" r="8" fill="#222"/>
    <circle cx="0"   cy="100"  r="8" fill="#222"/>
    <circle cx="0"   cy="-65"  r="7" fill="#222"/>
    <circle cx="55"  cy="0"    r="7" fill="#222"/>
    <circle cx="0"   cy="65"   r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <circle cx="-55" cy="0"    r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <text x="0" y="135" text-anchor="middle" font-style="italic">isomer 3</text>
  </g>

  <!-- BOTTOM ROW: two rotational variants of isomer 3 ------------------- -->

  <g transform="translate(255,360)">
    <use href="#oct"/>
    <!-- variant a: paired equator, rotated 90° -->
    <circle cx="0"   cy="-100" r="8" fill="#222"/>
    <circle cx="0"   cy="100"  r="8" fill="#222"/>
    <circle cx="0"   cy="-65"  r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <circle cx="55"  cy="0"    r="7" fill="#222"/>
    <circle cx="0"   cy="65"   r="7" fill="#222"/>
    <circle cx="-55" cy="0"    r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <text x="0" y="135" text-anchor="middle" font-style="italic">variant of 3</text>
  </g>

  <g transform="translate(505,360)">
    <use href="#oct"/>
    <!-- variant b: paired equator, another rotation -->
    <circle cx="0"   cy="-100" r="8" fill="#222"/>
    <circle cx="0"   cy="100"  r="8" fill="#222"/>
    <circle cx="0"   cy="-65"  r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <circle cx="55"  cy="0"    r="7" fill="#fff" stroke="black" stroke-width="1.2"/>
    <circle cx="0"   cy="65"   r="7" fill="#222"/>
    <circle cx="-55" cy="0"    r="7" fill="#222"/>
    <text x="0" y="135" text-anchor="middle" font-style="italic">variant of 3</text>
  </g>

  <!-- Connecting curve between top and bottom rows, as in original -->
  <path d="M 630 290 Q 500 320, 380 295" fill="none" stroke="black" stroke-width="0.8"/>

  <text x="20" y="445" font-style="italic">
    The two bottom sketches are rotational reorderings of isomer 3 — not new isomers.
  </text>
</svg>
